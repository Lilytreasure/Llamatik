name: Publish to Maven Central on Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install tools
        run: |
          brew update
          brew install cmake # if your native build expects it
          cmake --version

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version from tag
        id: v
        run: |
          RAW_REF="${GITHUB_REF_NAME}"
          VERSION="${RAW_REF#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Sonatype (staging)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          ./gradlew \
            -Pversion=${RELEASE_VERSION} \
            publishToSonatype

      - name: Close & Release
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          ./gradlew closeAndReleaseSonatypeStagingRepository